<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Our Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family: Georgia, serif; }
    nav {
      text-align:center;
      padding:15px;
      border-bottom:1px solid #eee;
    }
    nav a {
      margin:0 10px;
      text-decoration:none;
      color:#333;
    }
    .hero {
      height:100vh;
      background:#f5f5f5;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
    }
    .hero h1 { font-size:40px; }
    section { padding:60px 20px; text-align:center; }
    .gallery img {
      width:90%;
      max-width:400px;
      margin:10px;
      border-radius:8px;
    }
    input, textarea {
      width:90%;
      max-width:400px;
      margin:8px 0;
      padding:10px;
    }
    button {
      padding:10px 20px;
      background:#222;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#gallery">Gallery</a>
  <a href="#rsvp">RSVP</a>
</nav>

<div class="hero" id="home">
  <h1>Our Wedding</h1>
  <p>Two hearts, one journey</p>
</div>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="images/wedding/1.jpg">
    <img src="images/nonwedding/1.jpg">
  </div>
</section>

<section id="rsvp">
  <h2>RSVP</h2>
  <input placeholder="Name">
  <input placeholder="Email">
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
</section>

</body>
</html>
